services:
  nginx:
    image: nginx:alpine
    depends_on:
      - backend
    ports:
      - "81:80" # nginx listens on 80 inside the container
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - app-network

# Reuse the same network from the base compose
networks:
  app-network:
    external: false


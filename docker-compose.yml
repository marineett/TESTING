  #     - CI=true
  #     - NPM_CONFIG_LOGLEVEL=warn
  #   command: sh -c "mkdir -p logs && npm start 2>&1 | tee logs/frontend.log"
  #   stdin_open: true
  #   tty: true
  #   depends_on:
  #     - backend
  #   networks:
  #     - app-network

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # Jaeger collector HTTP
      - "4317:4317"    # OTLP gRPC
      - "4318:4318"    # OTLP HTTP
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./tools/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"  # Prometheus UI
    networks:
      - app-network
    depends_on:
      - backend

volumes:
  prometheus_data:

networks:
  app-network:
    driver: bridge
    # No hardcoded name; Compose will create <project>_app-network per run


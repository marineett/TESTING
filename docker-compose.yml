  backend:
      build:
        context: ./backend
        dockerfile: Dockerfile
      environment:
        DATABASE_HOST: db
        DATABASE_NAME: mydb
        DATABASE_USER: user
        DATABASE_PASSWORD: pass
        BACKEND_PORT: "8000"
        JWT_SECRET: "dev-secret"
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health || exit 1"]
        interval: 3s
        timeout: 2s
        retries: 40
        start_period: 120s
      networks:
        - app-network
      ports:
        - "8000:8000"

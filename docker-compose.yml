services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
      POSTGRES_CLIENT_MIN_MESSAGES: notice
      POSTGRES_LOG_MIN_MESSAGES: notice
      POSTGRES_PORT: 5433
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
  
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
      - jaeger
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: mydb
      DATABASE_USER: user
      DATABASE_PASSWORD: pass
      BACKEND_PORT: "8000"
      JWT_SECRET: "dev-secret"
      SERVICE_NAME: "tutoring-platform"
      SERVICE_VERSION: "1.0.0"
      JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
      OTEL_EXPORTER_JAEGER_ENDPOINT: "http://jaeger:14268/api/traces"
    networks:
      - app-network
    ports:
      - "8000:8000"
      - "9090:9090"  # Prometheus metrics endpoint


  # frontend:
  #   build: ./frontend
  #   ports:
  #     - "3000:3000"
  #   volumes:
  #     - ./frontend:/app:delegated
  #     - /app/node_modules
  #     - ./logs:/app/logs
  #   environment:
  #     - CHOKIDAR_USEPOLLING=true
  #     - WATCHPACK_POLLING=true
  #     - REACT_APP_BACKEND_URL=http://backend:8000
  #     - WDS_SOCKET_PORT=3000

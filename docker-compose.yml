services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: mydb
      POSTGRES_CLIENT_MIN_MESSAGES: notice
      POSTGRES_LOG_MIN_MESSAGES: notice
      POSTGRES_PORT: 5433
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      DATABASE_HOST: db
      DATABASE_NAME: mydb
      DATABASE_USER: user
      DATABASE_PASSWORD: pass
      BACKEND_PORT: "8000"
      JWT_SECRET: "dev-secret"
    networks:
      - backend
    ports:
      - "8000:8000"



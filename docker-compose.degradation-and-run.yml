services:
  backend:
    # этот healthcheck "подмешается" к backend из docker-compose.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8000/api/health || exit 1"]
      interval: 3s
      timeout: 2s
      retries: 40
      start_period: 120s

  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=2h"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro,cached
      - prom_data:/prometheus
    networks: [app-network]

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor
    privileged: true
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - '--docker_only=true'
      - '--housekeeping_interval=10s'
      - '--disable_metrics=diskIO,disk,network,tcp,udp'
    networks: [app-network]

  node-exporter:
    image: prom/node-exporter:v1.8.1
    command: ["--path.rootfs=/host", "--no-collector.filesystem.mount-points"]
    volumes:
      - /:/host:ro
    networks: [app-network]

  # Runner, который даёт статическую нагрузку (1 инстанс) и пишет latency/result/timestamps
  degradation-and-run-runner:
    build:
      context: .
      dockerfile: e2e/Dockerfile.degradation-and-run
    depends_on:
      backend:
        condition: service_healthy
      prometheus:
        condition: service_started
      cadvisor:
        condition: service_started
      node-exporter:
        condition: service_started
    networks: [app-network]
    environment:
      - BACKEND_URL=http://backend:8000
      - OUTPUT_DIR=/metrics/static_load
      - BATCH_SIZE=${BATCH_SIZE:-60}
      - POST_TEST_SLEEP=${POST_TEST_SLEEP:-15}
    volumes:
      - ./metrics:/metrics:rw,cached
    # ВНИМАНИЕ: экранируем $ как $$, иначе compose подумает, что это его переменные
    entrypoint:
      - sh
      - -lc
      - |
        DIR="/metrics/static_load";
        mkdir -p "$$DIR" && chmod 777 "$$DIR";
        echo "Directory: $$DIR";
        exec /usr/local/bin/degradation_and_run
    user: "0:0"
    restart: "no"

  metrics-collector:
    image: alpine:3.19
    depends_on:
      degradation-and-run-runner:
        condition: service_completed_successfully
      prometheus:
        condition: service_started
    environment:
      PROM_URL: http://prometheus:9090
      STEP: 5s
      # собираем CPU/MEM по compose-лейблу backend'а
      PROMQL_CPU: 'sum(rate(container_cpu_usage_seconds_total{job="cadvisor",container_label_com_docker_compose_service="backend"}[60s]))'
      PROMQL_MEM: 'sum(container_memory_working_set_bytes{job="cadvisor",container_label_com_docker_compose_service="backend"})'
    entrypoint:
      - sh
      - -lc
      - |
        apk add --no-cache curl jq >/dev/null
        echo "Waiting for Prometheus..."
        for i in $$(seq 1 60); do
          if curl -sf $${PROM_URL}/-/ready >/dev/null 2>&1; then
            echo "Prometheus is ready"; break
          else
            echo "... waiting ($$i/60)"; sleep 2
          fi
        done

        DIR="/metrics/static_load"
        echo "Waiting for timestamps.env in $$DIR ..."
        MAX_WAIT=300; WAITED=0
        while [ $$WAITED -lt $$MAX_WAIT ]; do
          if [ -f "$$DIR/timestamps.env" ] && grep -q '^END_TS=' "$$DIR/timestamps.env"; then
            echo "Found timestamps"; break
          fi
          sleep 2; WAITED=$$((WAITED+2))
        done

        OUTPUT_DIR="$$DIR" sh /collect.sh
        echo "Collection done."
    networks: [app-network]
    volumes:
      - ./metrics:/metrics:rw,cached
      - ./monitoring/collect_prometheus.sh:/collect.sh:ro

networks:
  app-network:
    external: false

volumes:
  prom_data: {}

worker_processes auto;
events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    
    # gzip
    gzip on;
    gzip_min_length 1000;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/rss+xml image/svg+xml;

    # proxy cache (for static GETs, exclude /api)
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=static_cache:10m max_size=100m inactive=60m use_temp_path=off;

    # Upstreams for GET balancing (weights 2:1:1)
    upstream backend_get {
        server app_main:8000 weight=2 max_fails=3 fail_timeout=30s;
        server app_read1:8000 weight=1 max_fails=3 fail_timeout=30s;
        server app_read2:8000 weight=1 max_fails=3 fail_timeout=30s;
    }

    # Upstream for write operations
    upstream backend_write {
        server app_main:8000 max_fails=3 fail_timeout=30s;
    }

    # Upstream for mirror (separate deployment)
    upstream backend_mirror {
        server app_mirror:8000 max_fails=3 fail_timeout=30s;
    }

    upstream grafana_backend {
        server grafana:3000;
    }

    # HTTP сервер - редирект на HTTPS
    server {
        listen 80;
        server_name _;
        
        # Редирект всех HTTP запросов на HTTPS
        return 301 https://$host$request_uri;
    }

    # HTTPS сервер с HTTP/2
    server {
        listen 443 ssl http2;  # ← HTTP/2 включён
        server_name _;
        
        # SSL сертификаты
        ssl_certificate /etc/nginx/ssl/localhost.pem;
        ssl_certificate_key /etc/nginx/ssl/localhost-key.pem;
        
        # SSL настройки
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        
        root /usr/share/nginx/html;
        index static/index.html index.html index.htm;
        add_header X-App-Name "TutoringPlatform" always;

        location = /status/raw {
            stub_status on;
            access_log off;
        }

        location = /status {
            try_files /status.html =404;
        }

        location = /status.css {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "no-store, must-revalidate";
            default_type text/css;
        }

        location = /status.js {
            root /usr/share/nginx/html;
            access_log off;
            add_header Cache-Control "no-store, must-revalidate";
        }

        location = /documentation {
            try_files /documentation.html =404;
            charset utf-8;
            default_type text/html;
            add_header Content-Type "text/html; charset=utf-8";
        }

        location = /legacy {
            rewrite ^ /legacy/ last;
        }

        # Ensure bare /mirror redirects to /mirror/ (trailing slash normalized)
        location = /mirror {
            return 301 /mirror/;
        }

        # Proxy API calls under /mirror/api/... to the mirror backend (strip /mirror prefix)
        location ~ ^/mirror(/api/.*)$ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Prefix /mirror;

            proxy_connect_timeout 5s;
            proxy_read_timeout 120s;

            proxy_pass http://backend_mirror$1;

            # WebSocket support if backend uses it
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_redirect off;
        }

        # Serve mirror SPA: fallback to static/index.html for non-API requests
        location /mirror/ {
            try_files $uri $uri/ /static/index.html;

            # Rewrite HTML so absolute asset paths point under /mirror/static/
            sub_filter_types text/html;
            sub_filter_once off;
            sub_filter '/static/' '/mirror/static/';
        }

        # Proxy all /legacy/ requests to backend /api/v2/legacy/ preserving subpaths
        location /legacy/ {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;

            proxy_pass http://app_main:8000/api/v2/legacy/;
            proxy_redirect /api/v2/legacy/ /legacy/;
        }

        # HTTP/2 Server Push для index.html
        location = /static/index.html {
            root /usr/share/nginx/html;
            
            # Push критичные ресурсы ПЕРЕД отправкой HTML
            http2_push /static/logo.png;
            
            expires 1h;
            add_header Cache-Control "public, max-age=3600";
        }

        # Serve static content
        location /static/ {
            root /usr/share/nginx/html;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri $uri/ =404;
        }

        # Serve mirror static assets from the same filesystem under /mirror/static/
        location /mirror/static/ {
            alias /usr/share/nginx/html/static/;
            access_log off;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
            try_files $uri $uri/ =404;
        }

        # Proxy Grafana at /monitoring
        location /monitoring/ {
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $http_host;
            proxy_set_header X-Forwarded-Server $host;

            proxy_pass http://grafana_backend;

            # Handle WebSocket connections
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_redirect off;
        }

        location /api/ {
            # If method is GET, use weighted backend pool
            if ($request_method = GET) {
                proxy_pass http://backend_get;
            }

            # All other methods -> write upstream
            if ($request_method != GET) {
                proxy_pass http://backend_write;
            }

            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 5s;
            proxy_read_timeout 60s;
        }

        location /admin {
            proxy_pass http://adminer:8080/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /managment {
            try_files /managment.html =404;
        }

        location = /reserved {
            try_files /static/index.html =404;
        }

        location /reserved/ {
            try_files $uri $uri/ /static/index.html;
        }

        location = / {
            # HTTP/2 Server Push для главной страницы
            http2_push /static/logo.png;
            try_files /static/index.html =404;
        }

        location / {
            try_files $uri $uri/ /static/index.html =404;
        }

        proxy_intercept_errors on;
        error_page 502 503 504 = /_error_backend;

        location = /_error_backend {
            internal;
            default_type application/json;
            return 503 '{"detail": "Upstream error or read-only node received a write request"}';
        }
    }
}
